plugin: amazon.aws.aws_ec2    #dynamic inventory yaml file
regions:
- us-east-1
hostnames:
- private-ip-address
filters:
  instance-state-name : running
  tag:Name: frontend-dev 
compose:
  # This sets the ansible_host variable to connect with the private ip address without changing the host name.
  ansible_host: private_ip_address
keyed_groups:
- separator: ''
  key: tags.Name | regex_replace('-.*$', '')



# if we run this will get all instances under us-east-1